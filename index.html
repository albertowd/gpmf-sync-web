<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browser-side GoPro MP4 timestamp extractor. Files never leave your device."
    />
    <title>GPMF Sync</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      body {
        background: #1e1e1e;
        color: #e8e8e8;
        font-family: -apple-system, "Segoe UI", system-ui, Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.45;
        overflow: hidden;
      }
      .boot {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }
      .boot-header {
        padding: 10px 18px 6px 18px;
      }
      .boot-subtitle {
        color: #b8b8b8;
        font-size: 12px;
        margin: 0;
      }
      .boot-status {
        padding: 6px 18px;
        color: #b8b8b8;
        font-size: 12px;
      }
      .boot-cards {
        flex: 1;
        min-height: 0;
        padding: 6px 18px;
        display: flex;
        flex-direction: column;
      }
      .boot-drop {
        flex: 1;
        min-height: 0;
        border: 2px solid #2d2d2d;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .boot-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        color: #b8b8b8;
        font-style: italic;
        font-size: 14px;
        text-align: center;
        background: transparent;
        border: none;
        font-family: inherit;
      }
      .boot-msg-mobile {
        display: none;
      }
      @media (hover: none) and (pointer: coarse) {
        .boot-msg-desktop {
          display: none;
        }
        .boot-msg-mobile {
          display: inline;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="boot-header">
          <p class="boot-subtitle">
            Compare first-timestamps across GoPro MP4, TCX, and RaceChrono v3 CSV files. Files never
            leave your browser.
          </p>
        </div>
        <div class="boot-status">
          <span class="boot-msg-desktop">Drop files to begin.</span>
          <span class="boot-msg-mobile">Tap below to add files.</span>
        </div>
        <div class="boot-cards">
          <div class="boot-drop">
            <button type="button" class="boot-placeholder">
              <span class="boot-msg-desktop"
                >Drop GoPro MP4 / TCX / CSV files here&nbsp;&nbsp;—&nbsp;&nbsp;or click to
                browse.</span
              >
              <span class="boot-msg-mobile">Tap to browse GoPro MP4 / TCX / CSV files.</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
